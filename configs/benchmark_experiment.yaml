# ============================================================================
# CASDA Benchmark Experiment Configuration
# 3 models x 4 dataset groups = 12 training runs
# Groups: baseline_raw, baseline_trad, casda_composed, casda_composed_pruning
# ============================================================================

experiment:
  name: "casda_benchmark_v1"
  seed: 42
  num_workers: 2
  device: "cuda"
  output_dir: "outputs/benchmark_results"
  log_dir: "outputs/benchmark_logs"

# ----------------------------------------------------------------------------
# Dataset Configuration
# ----------------------------------------------------------------------------
dataset:
  # Severstal Steel Defect Dataset
  image_dir: "train_images"
  annotation_csv: "train.csv"
  image_size: [256, 1600]  # H x W (original Severstal dimensions)
  num_classes: 4
  class_names: ["Class1", "Class2", "Class3", "Class4"]

  # Train / Validation / Test split
  split:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    stratify: true  # stratify by class distribution
    seed: 42

  # CASDA synthetic data paths
  # v5.4: Poisson Blending composition (512×512 → 1600×256 합성)
  # CLI --casda-dir 로 override 가능 (prepare_benchmark_data.py, run_benchmark.py)
  casda:
    composed_dir: "data/augmented/casda_composed"   # Poisson Blending 합성 이미지
    roi_dir: ""  # ControlNet 생성 ROI 디렉토리 (generated/). 비어있으면 full_dir fallback.
                 # CLI --casda-roi-dir 로 override 가능.
                 # 예: /content/drive/MyDrive/data/Severstal/augmented_images_v5.5/generated
    suitability_threshold: 0.0   # v5.5: compose 시 quality_score 미생성 → 전부 0.5 → top_k만으로 pruning
    pruning_top_k: 2500

# ----------------------------------------------------------------------------
# 4 Dataset Groups (Control Groups)
# ----------------------------------------------------------------------------
dataset_groups:
  baseline_raw:
    name: "Baseline (Raw)"
    description: "Severstal original dataset only, no augmentation"
    use_original: true
    augmentation: "none"
    casda_data: null

  baseline_trad:
    name: "Baseline (Trad)"
    description: "Original + traditional geometric augmentations"
    use_original: true
    augmentation: "traditional"
    casda_data: null
    traditional_augmentation:
      horizontal_flip: 0.5
      vertical_flip: 0.3
      rotation_limit: 15
      scale_range: [0.8, 1.2]
      brightness_limit: 0.2
      contrast_limit: 0.2

  casda_composed:
    name: "CASDA-Composed"
    description: "Original + Poisson Blending 합성 CASDA 이미지 (전체)"
    use_original: true
    augmentation: "none"
    casda_data: "composed"

  casda_composed_pruning:
    name: "CASDA-Composed-Pruning"
    description: "Original + Poisson Blending 합성 CASDA 이미지 (품질 pruning, stratified top-k)"
    use_original: true
    augmentation: "none"
    casda_data: "composed"
    casda_pruning:
      enabled: true
      suitability_threshold: 0.0   # v5.5: quality_score 부재 → top_k만으로 필터링
      top_k: 2500
      stratified: true

  # ── Ablation Study Groups ──
  ablation_no_blending:
    name: "CASDA-NoBlending"
    description: "Ablation: Poisson Blending 제거 — ControlNet 생성 ROI 직접 paste"
    use_original: true
    augmentation: "none"
    casda_data: "composed"
    casda_dir_override: "data/augmented/casda_no_blend"  # compose --no-blend 출력 디렉토리
    casda_pruning:
      enabled: true
      suitability_threshold: 0.0
      top_k: 2500
      stratified: true

  ablation_no_pruning:
    name: "CASDA-NoPruning"
    description: "Ablation: Pruning 제거 — suitability 필터 없이 CASDA 이미지 사용 (수량만 제한)"
    use_original: true
    augmentation: "none"
    casda_data: "composed"
    casda_pruning:
      enabled: true
      suitability_threshold: 0.0   # 품질 필터링 없음 (전부 통과)
      top_k: 5000                  # 수량 제한만 적용 (inject 시간 제한)
      stratified: false            # stratified pruning 비활성화 (무작위 순서 유지)

  # ── CopyPaste Baseline ──
  copypaste:
    name: "CopyPaste"
    description: "Baseline: 원본 ROI를 clean background에 직접 paste (Poisson Blending 없음)"
    use_original: true
    augmentation: "none"
    casda_data: "composed"
    casda_dir_override: "data/augmented/copypaste_baseline"  # create_copypaste_baseline.py 출력
    casda_pruning:
      enabled: false  # 전체 사용 (ROI 수 통제)

# ----------------------------------------------------------------------------
# 3 Benchmark Models
# ----------------------------------------------------------------------------
models:
  yolo_mfd:
    name: "YOLO-MFD"
    type: "detection"
    description: "Multi-scale Edge Feature Enhancement for micro-defect detection"
    backbone: "yolov8s"  # base architecture
    custom_modules:
      mefe: true  # Multi-scale Edge Feature Enhancement module
    input_size: [640, 640]  # max side=640; rect=True auto-adjusts for 256x1600
    training:
      epochs: 300
      batch_size: 16
      optimizer: "AdamW"
      learning_rate: 0.001
      weight_decay: 0.0005
      lr_scheduler: "cosine"
      warmup_epochs: 10
      early_stopping_patience: 30
      conf_threshold: 0.25
      iou_threshold: 0.5
      use_amp: true  # Mixed Precision Training (T4 Tensor Core)

  eb_yolov8:
    name: "EB-YOLOv8"
    type: "detection"
    description: "BiFPN-based compound feature fusion for Severstal benchmark"
    backbone: "yolov8s"
    custom_modules:
      bifpn: true  # Bi-directional Feature Pyramid Network
      enhanced_backbone: true
    input_size: [640, 640]  # max side=640; rect=True auto-adjusts for 256x1600
    training:
      epochs: 300
      batch_size: 16
      optimizer: "AdamW"
      learning_rate: 0.001
      weight_decay: 0.0005
      lr_scheduler: "cosine"
      warmup_epochs: 10
      early_stopping_patience: 30
      conf_threshold: 0.25
      iou_threshold: 0.5
      use_amp: true

  deeplabv3plus:
    name: "DeepLabV3+"
    type: "segmentation"
    description: "Standard segmentation baseline for Severstal analysis"
    backbone: "resnet101"
    pretrained: true
    output_stride: 16
    input_size: [256, 512]  # resized for segmentation
    training:
      epochs: 300
      batch_size: 8
      optimizer: "AdamW"
      learning_rate: 0.0001
      weight_decay: 0.0001
      lr_scheduler: "poly"
      poly_power: 0.9
      warmup_epochs: 5
      early_stopping_patience: 40
      use_amp: true

# ----------------------------------------------------------------------------
# Evaluation Configuration
# ----------------------------------------------------------------------------
evaluation:
  # Detection metrics
  detection:
    iou_thresholds: [0.5]  # mAP@0.5
    conf_threshold: 0.25
    compute_class_ap: true  # per-class AP
    compute_pr_curve: true  # Precision-Recall curves

  # Segmentation metrics
  segmentation:
    compute_dice: true
    compute_iou: true
    compute_class_dice: true  # per-class Dice score
    threshold: 0.5

  # FID Score (synthetic data quality)
  fid:
    compute: true
    batch_size: 64
    dims: 2048  # InceptionV3 feature dimension
    max_images: 1000  # 각 세트에서 랜덤 샘플링할 최대 이미지 수 (seeded)
    per_class: true  # class-wise FID (metadata.json 필요)
    num_workers: 4  # DataLoader worker 수 (이미지 I/O 병렬화, Windows에서는 자동 0)
    fid_mode: both  # "roi" | "composed" | "both"
    #   roi: real ROI patches vs casda_full (ControlNet 생성 품질)
    #   composed: real 전체 이미지 vs casda_composed (Poisson Blending 최종 품질)
    #   both: 두 메트릭 모두 계산
    roi_metadata_csv: ""  # roi_metadata.csv 경로 (빈 문자열이면 --casda-dir에서 자동 탐색)

    # FID-ROI 세분화 설정 (SCI 논문 수준 분석)
    # roi_metadata.csv의 defect_subtype, background_type 컬럼 활용
    roi_granularity:
      by_defect_subtype: true   # defect_subtype별 FID-ROI (5그룹)
      by_background_type: true  # background_type별 FID-ROI (5그룹)
      cross_class_subtype: true # class_id × defect_subtype 교차 FID (유효 조합만)
      min_samples: 20           # 그룹당 최소 샘플 수 (real/syn 각각). 미달 시 스킵.

# ----------------------------------------------------------------------------
# CASDA Ratio Experiment Presets (P3)
# CLI: --casda-ratio 0.1 0.2 0.3 0.5 --casda-ratio-source composed
# 아래 설정은 YAML 기반 ratio 프리셋 (CLI 없이도 ratio 실험 가능)
# CLI --casda-ratio가 지정되면 이 섹션은 무시됨
# ----------------------------------------------------------------------------
casda_ratio:
  enabled: false  # true로 변경하면 아래 비율들이 자동으로 그룹 생성
  source: "composed"  # "full" | "composed" (CLI --casda-ratio-source와 동일)
  ratios: [0.10, 0.20, 0.30, 0.50]  # 실험할 비율 목록
  include_baseline: true  # baseline_raw 자동 포함 (비교 기준선)

# ----------------------------------------------------------------------------
# Results Reporting
# ----------------------------------------------------------------------------
reporting:
  save_metrics_csv: true
  save_pr_curves: true
  save_confusion_matrix: true
  generate_comparison_table: true
  hypothesis_tests:
    # - name: "H1"
    #   description: "CASDA > Traditional augmentation (mAP)"
    #   compare: ["casda_composed", "baseline_trad"]
    #   metric: "mAP@0.5"
    # - name: "H2"
    #   description: "Pruning > Full (efficiency)"
    #   compare: ["casda_composed_pruning", "casda_composed"]
    #   metric: "mAP@0.5"
    - name: "H3"
      description: "CASDA effect is architecture-independent"
      compare: ["casda_composed_pruning", "baseline_raw"]
      metric: "mAP@0.5"
      across_models: true
    - name: "H4"
      description: "CASDA improves minority classes (3, 4)"
      compare: ["casda_composed_pruning", "baseline_raw"]
      metric: "class_ap"
      focus_classes: [3, 4]
    - name: "H5"
      description: "CASDA images are physically plausible (FID)"
      metric: "fid_score"
    - name: "H6"
      description: "Optimal CASDA ratio exists (non-monotonic)"
      compare: ["casda_ratio_10", "casda_ratio_20", "casda_ratio_30", "casda_ratio_50", "baseline_raw"]
      metric: "mAP@0.5"
      analysis: "find_optimal"  # 최적 비율 탐색 (peak detection)
